*{margin:0;padding:0;box-sizing:border-box;}
#etoile{position:fixed;top:5px;left:50%;transform:translateX(-50%);z-index:200;width:50px;height:50px;pointer-events:none;}
.em-core{position:absolute;inset:12px;border-radius:50%;background:radial-gradient(circle at 32% 28%,#fff,#e8f6ff);animation:emG 2.8s ease-in-out infinite;}
@keyframes emG{
  0%,100%{box-shadow:0 0 6px 3px #fff,0 0 16px 7px rgba(200,230,255,.8),0 0 35px 14px rgba(170,210,255,.4);}
  25%{box-shadow:0 0 3px 2px rgba(255,255,255,.6),0 0 8px 4px rgba(200,230,255,.5),0 0 18px 8px rgba(170,210,255,.2);}
  50%{box-shadow:0 0 12px 6px #fff,0 0 28px 12px rgba(200,230,255,1),0 0 55px 22px rgba(170,210,255,.7);}
  75%{box-shadow:0 0 4px 2px rgba(255,255,255,.7),0 0 10px 5px rgba(200,230,255,.6),0 0 22px 10px rgba(170,210,255,.3);}
}

/* Overlay léger pour lisibilité des parchemins */
#col-g,#col-d,#voute,#sol,#rayons{display:none;}


  50%{opacity:.8;}
  100%{opacity:.5;}
}

/* Mur = image de fond */
#mur-pierre{display:none;}
#mur-scroll{
  position:fixed;
  top:62px;
  bottom:58px;
  left:50%;
  transform:translateX(-50%);
  width:72%;
  max-width:480px;
  z-index:10;
  overflow-y:auto;
  overflow-x:hidden;
  padding:8px 0 20px;
}
#mur-scroll::-webkit-scrollbar{width:2px;}
#mur-scroll::-webkit-scrollbar-thumb{background:rgba(212,168,67,.45);}

/* Parchemins petits et compacts — collés sur la pierre */
.parc{
  position:relative;
  margin-bottom:12px;
  padding:11px 11px 9px;
  border-radius:2px 2px 4px 4px;
  cursor:pointer;
  opacity:0;
  animation:entrer .45s ease forwards;
  transition:transform .22s,box-shadow .22s;
  /* Ombre forte = impression d'être épinglé sur la pierre */
  box-shadow:
    3px 4px 16px rgba(0,0,0,.75),
    1px 1px 3px rgba(0,0,0,.9),
    inset 0 1px 0 rgba(255,255,255,.5);
}
.parc:hover{transform:translateY(-3px) rotate(.3deg);}
.parc:active{transform:scale(.97);}
@keyframes entrer{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* Témoignage — parchemin ivoire */
.parc.temoignage{
  /* Verre dépoli vert ancien — translucide, on voit le mur derrière */
  background:
    linear-gradient(148deg,
      rgba(140,160,100,.28) 0%,
      rgba(120,148,85,.25) 30%,
      rgba(130,155,92,.26) 60%,
      rgba(110,138,78,.23) 100%
    );
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  border:1px solid rgba(180,210,120,.35);
}

/* Prière — bleu nuit profond */
.parc.priere{
  background:linear-gradient(148deg,
    rgba(20,40,90,.38) 0%,
    rgba(15,30,68,.35) 30%,
    rgba(22,45,98,.38) 60%,
    rgba(12,25,58,.35) 100%
  );
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  border:1px solid rgba(100,155,220,.32);
}

/* Épingle */
.parc::before{
  content:'';position:absolute;
  top:-6px;left:50%;transform:translateX(-50%);
  width:10px;height:10px;border-radius:50%;
  box-shadow:0 2px 4px rgba(0,0,0,.7);
}
.temoignage::before{
  background:radial-gradient(circle at 32% 28%,#ffe060,#b09010);
  box-shadow:0 2px 4px rgba(0,0,0,.7),0 0 6px rgba(212,168,67,.6);
}
.priere::before{
  background:radial-gradient(circle at 32% 28%,#90b8f0,#2858c0);
  box-shadow:0 2px 4px rgba(0,0,0,.7),0 0 6px rgba(100,150,220,.6);
}

/* Badge NOUVEAU — pulse doré */
.parc.nouveau{
  animation:entrer .45s ease forwards,nvP 2.5s ease-in-out .5s infinite;
}
.parc.nouveau::after{
  content:'NOUVEAU';
  position:absolute;top:-8px;right:8px;
  font-family:'Cinzel',serif;font-size:.4rem;letter-spacing:.12em;
  color:#fff;padding:2px 6px;border-radius:7px;
  background:linear-gradient(135deg,rgba(212,168,67,.95),rgba(160,110,18,.9));
  box-shadow:0 0 8px rgba(212,168,67,.7);
  animation:nbA 2.5s ease-in-out infinite;
}
/* NON LU — halo blanc scintillant */
.parc.non-lu{
  animation:entrer .45s ease forwards,nonluHalo 2.5s ease-in-out .5s infinite !important;
  border:1.5px solid rgba(255,255,255,.65) !important;
}
@keyframes nonluHalo{
  0%,100%{
    box-shadow:3px 4px 16px rgba(0,0,0,.75),
    0 0 0 1px rgba(255,255,255,.3),
    0 0 10px rgba(255,255,255,.2);
  }
  45%{
    box-shadow:3px 4px 16px rgba(0,0,0,.75),
    0 0 0 3px rgba(255,255,255,.85),
    0 0 22px rgba(255,255,255,.45),
    0 0 40px rgba(200,220,255,.25);
  }
  90%{
    box-shadow:3px 4px 16px rgba(0,0,0,.75),
    0 0 0 1px rgba(255,255,255,.2),
    0 0 6px rgba(255,255,255,.1);
  }
}
  50%{opacity:1;border-color:rgba(255,255,255,.8);box-shadow:0 0 8px rgba(255,255,255,.4);}
}
@keyframes nvP{
  0%,100%{box-shadow:3px 4px 16px rgba(0,0,0,.75),0 0 0 1px rgba(212,168,67,.55);}
  50%{box-shadow:3px 4px 16px rgba(0,0,0,.75),0 0 0 2px rgba(255,220,60,.95),0 0 20px rgba(212,168,67,.7);}
}
@keyframes nbA{0%,100%{opacity:.82;}50%{opacity:1;box-shadow:0 0 14px rgba(212,168,67,.95);}}

/* Niveaux de témoignage gamifiés */
.parc[data-niveau="bronze"]::after{
  content:"✦";position:absolute;top:-7px;left:8px;
  font-size:.7rem;color:#cd7f32;
  text-shadow:0 0 8px rgba(205,127,50,.8);
}
.parc[data-niveau="argent"]::after{
  content:"✦✦";position:absolute;top:-7px;left:8px;
  font-size:.7rem;color:#c0c0c0;
  text-shadow:0 0 8px rgba(192,192,192,.9);
}
.parc[data-niveau="or"]::after{
  content:"✦✦✦";position:absolute;top:-7px;left:6px;
  font-size:.7rem;color:#ffd700;
  text-shadow:0 0 12px rgba(255,215,0,1),0 0 24px rgba(212,168,67,.8);
  animation:orBrille 2s ease-in-out infinite;
}
@keyframes orBrille{0%,100%{opacity:.85;}50%{opacity:1;text-shadow:0 0 18px rgba(255,215,0,1),0 0 36px rgba(212,168,67,1);}}

/* Parchemin sélectionné = couronné */
.parc.actif.temoignage{
  transform:translateY(-2px);
  animation:entrer .45s ease forwards,cOr 3s ease-in-out .5s infinite;
}
.parc.actif.priere{
  transform:translateY(-2px);
  animation:entrer .45s ease forwards,cBl 3s ease-in-out .5s infinite;

  try{

window.fbChargerTemoignages = function(callback){
  var q = query(collection(_db,'temoignages'), orderBy('ts','desc'));

    var docs = [];

        r:        dat.r||{coeur:0,priere:0,alleluia:0,amen:0}
      });
    });
    callback(docs);
  });
};

window.fbChargerCommentaires = function(temoignageId, callback){

var fc='tout',actif=null,toastT;

function dA(ts){
  var d=(Date.now()-ts)/1000;
  if(d<60)return 'maintenant';
  if(d<3600)return Math.floor(d/60)+'min';
  if(d<86400)return Math.floor(d/3600)+'h';
  return Math.floor(d/86400)+'j';
}

function render(){
  var liste=document.getElementById('liste');
  var data=fc==='priere'?DATA.filter(function(d){return d.type==='priere';}):DATA;
  liste.innerHTML='';
  data.forEach(function(doc,i){
    var cls='parc '+doc.type+(doc.nouveau?' nouveau':'')+((!doc.lu&&!doc.nouveau)?' non-lu':'')+(actif&&actif.id===doc.id?' actif':'');
    var el=document.createElement('div');
    el.className=cls;
    el.style.animationDelay=(i*.07)+'s';
    var total=doc.r.coeur+doc.r.priere+doc.r.alleluia+doc.r.amen;
    if(total>=50) el.setAttribute('data-niveau','or');
    else if(total>=20) el.setAttribute('data-niveau','argent');
    else if(total>=8) el.setAttribute('data-niveau','bronze');
    // Badge NOUVEAU en haut du parchemin
    var badgeHTML = doc.nouveau
      ? '<div style="text-align:center;font-family:Cinzel,serif;font-size:.52rem;' +
        'letter-spacing:.1em;color:#fff;text-shadow:0 0 8px rgba(255,150,0,1);' +
        'background:linear-gradient(135deg,rgba(255,100,0,.85),rgba(200,50,0,.8));' +
        'padding:3px 10px;border-radius:8px;margin-bottom:6px;' +
        'animation:badgeN 1.5s ease-in-out infinite;' +
        'box-shadow:0 0 12px rgba(255,100,0,.7);">🔥 NOUVEAU 🔥</div>'
      : '';

    el.innerHTML=
      badgeHTML+
      '<div class="pn">'+
        '<span>'+(doc.type==='priere'?'🙏':'✨')+' '+doc.nom+'</span>'+
        '<span class="pd">'+dA(doc.ts)+'</span>'+
      '</div>'+
      (doc.ref?'<div class="pr">📖 '+doc.ref+'</div>':'')+
      '<p class="pt">'+doc.texte+'</p>'+
      '<div class="preac" id="reac-'+doc.id+'"></div>';
    el.addEventListener('click',function(){ouvrir(doc);});
    liste.appendChild(el);
    // Réactions inline
    var reacDiv=document.getElementById('reac-'+doc.id);
    [['coeur','❤️'],['priere','🙏'],['alleluia','🙌'],['amen','✝️']].forEach(function(rv){
      var sp=document.createElement('span');
      sp.className='rp';
      sp.innerHTML=rv[1]+' <span id="ri-'+doc.id+'-'+rv[0]+'">'+doc.r[rv[0]]+'</span>';
      sp.onclick=(function(id,t){return function(e){e.stopPropagation();ril(id,t);};})(doc.id,rv[0]);
      reacDiv.appendChild(sp);
    });
    // Bouton 💬 commentaire dans la fiche
    var sc=document.createElement('span');
    sc.className='rp';
    sc.innerHTML='💬';
    sc.title='Commenter';
    sc.onclick=(function(d){return function(e){
      e.stopPropagation();
      ouvrir(d); // Ouvre le modal lecture avec commentaires
    };})(doc);
    reacDiv.appendChild(sc);
  });
}

function ouvrir(doc){
  doc.nouveau=false;doc.lu=true;actif=doc;
  ['coeur','priere','alleluia','amen'].forEach(function(t){
    document.getElementById('c-'+t).textContent=doc.r[t];
  });
  var mb=document.getElementById('mbox');
  mb.className=doc.type;
  document.getElementById('mn').textContent=(doc.type==='priere'?'🙏 ':'✨ ')+doc.nom+(doc.ref?' — '+dA(doc.ts):'');
  document.getElementById('mr').textContent=doc.ref?'📖 '+doc.ref:'';
  document.getElementById('mt').textContent=doc.texte;
  var mr2=document.getElementById('mreac');mr2.innerHTML='';
  [['coeur','❤️'],['priere','🙏'],['alleluia','🙌'],['amen','✝️']].forEach(function(rv){
    var sp=document.createElement('span');
    sp.className='rp '+doc.type;
    sp.innerHTML=rv[1]+' <span id="mri-'+doc.id+'-'+rv[0]+'">'+doc.r[rv[0]]+'</span>';
    sp.onclick=(function(id,t){return function(){mReagir(id,t);};})(doc.id,rv[0]);
    mr2.appendChild(sp);
  });
  // ── CHARGER ET AFFICHER LES COMMENTAIRES ──
  var commDiv = document.getElementById('mur-commentaires');
  if(commDiv){
    commDiv.innerHTML = '<p style="text-align:center;font-style:italic;color:rgba(180,160,100,.8);font-size:.78rem;padding:8px;">Chargement...</p>';
    if(window.fbChargerCommentaires && doc.id){
      // Témoignage Firebase — charger ses commentaires
      window.fbChargerCommentaires(doc.id, function(comms){
        if(!commDiv) return;
        if(comms.length === 0){
          commDiv.innerHTML = '<p style="text-align:center;font-style:italic;opacity:.5;font-size:.75rem;padding:8px;">'+
            (L().com_vide||'Aucun commentaire pour l\'instant')+'</p>';
        } else {
          commDiv.innerHTML = comms.map(function(c){
            return '<div style="padding:8px 4px;border-bottom:1px solid rgba(255,255,255,.1);">'+
              '<div style="font-family:Cinzel,serif;font-size:.55rem;color:rgba(212,168,67,.85);margin-bottom:3px;">'+
                (c.nom||'Anonyme')+' <span style="opacity:.5;font-size:.5rem;">'+dA(c.ts)+'</span>'+
              '</div>'+
              '<div style="font-style:italic;font-size:.82rem;line-height:1.55;color:rgba(220,238,255,.95);">'+c.texte+'</div>'+
            '</div>';
          }).join('');
        }
      });
    } else {
      // Témoignage local (démo) — pas de commentaires Firebase
      commDiv.innerHTML = '<p style="text-align:center;font-style:italic;color:rgba(180,160,100,.9);font-size:.78rem;padding:8px;">'+
        (L().com_vide||'Aucun commentaire pour l\'instant')+'</p>';
    }
  }
  document.getElementById('modal').classList.add('show');
  render();
}

function fModal(){document.getElementById('modal').classList.remove('show');}

function mReagir(id,type){
  var doc=DATA.find(function(d){return d.id===id;});
  if(!doc)return;
  doc.r[type]++;
  var el=document.getElementById('mri-'+id+'-'+type);
  if(el)el.textContent=doc.r[type];
  var ri=document.getElementById('ri-'+id+'-'+type);
  if(ri)ri.textContent=doc.r[type];
  if(actif&&actif.id===id) document.getElementById('c-'+type).textContent=doc.r[type];
}

function reagir(type){
  if(!actif){t2('👆 Cliquez d abord sur un témoignage');return;}
  actif.r[type]++;
  var c=document.getElementById('c-'+type);
  c.textContent=actif.r[type];
  c.style.transform='scale(1.8)';
  setTimeout(function(){c.style.transition='transform .2s';c.style.transform='scale(1)';},50);
  var ri=document.getElementById('ri-'+actif.id+'-'+type);
  if(ri)ri.textContent=actif.r[type];
  var pb=document.getElementById('pb-'+type);
  if(pb){pb.classList.add('actif');setTimeout(function(){pb.classList.remove('actif');},900);}
  var m={coeur:L().tc,priere:L().tp,alleluia:L().ta,amen:L().tam};
  t2(m[type]);render();
}

function ril(id,type){
  var doc=DATA.find(function(d){return d.id===id;});
  if(!doc)return;
  doc.r[type]++;
  var el=document.getElementById('ri-'+id+'-'+type);
  if(el){el.textContent=doc.r[type];el.style.transform='scale(1.5)';
    setTimeout(function(){el.style.transform='scale(1)';},220);}
  if(actif&&actif.id===id) document.getElementById('c-'+type).textContent=doc.r[type];

    document.getElementById('mc-titre').textContent = '💬 '+(L().com||'Commenter')+' — '+actif.nom;

function favori(){

function partager(){
  if(!actif){t2(L().tse);return;}
  var txt = actif.nom + ' — ProviLight\n\n' +
    (actif.ref ? actif.ref+'\n' : '') +
    actif.texte + '\n\n🌟 provilight.netlify.app';
  var enc = encodeURIComponent(txt);
  // Afficher modal partage
  var mp = document.getElementById('modal-partage');
  if(mp){
    document.getElementById('mp-wa').href = 'https://wa.me/?text='+enc;
    document.getElementById('mp-fb').href = 'https://www.facebook.com/sharer/sharer.php?u=https://provilight.netlify.app&quote='+enc;
    document.getElementById('mp-tiktok').href = 'https://www.tiktok.com/';
    document.getElementById('mp-ig').href = 'https://www.instagram.com/';
    document.getElementById('mp-sms').href = 'sms:?body='+enc;

        navigator.clipboard.writeText(txt).then(function(){t2('📋 Copié !');fPartage();});

        document.body.appendChild(ta);ta.select();
        document.execCommand('copy');document.body.removeChild(ta);
        t2('📋 Copié !');fPartage();

function filtrer(type,btn){

  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('actif');});
  btn.classList.add('actif');
  ['coeur','priere','alleluia','amen'].forEach(function(x){document.getElementById('c-'+x).textContent='0';});

function ouvrirTemoigner(){
  var m = document.getElementById('modal-temoigner');
  if(m){ m.style.display='flex'; document.getElementById('tf-texte').value=''; document.getElementById('tf-nom').value=''; }
}
function fTemoigner(){
  var m = document.getElementById('modal-temoigner');
  if(m) m.style.display='none';
}
function publierTemoignage(){
  var texte = document.getElementById('tf-texte').value.trim();
  var nom = document.getElementById('tf-nom').value.trim() || 'Anonyme';
  var pays = document.getElementById('tf-pays') ? document.getElementById('tf-pays').value.trim() : '';
  var ref = document.getElementById('tf-ref').value.trim();
  if(texte.length < 10){ t2('Écrivez votre témoignage (min. 10 caractères)'); return; }
  var newDoc = {
    id: 'local-' + Date.now(),
    type: 'temoignage',
    nom: nom + (pays?' ('+pays+')':'') + ' 🌟',
    ref: ref || '',
    nouveau: true,
    lu: false,
    texte: texte,
    ts: Date.now(),
    r: {coeur:0, priere:0, alleluia:0, amen:0}
  };
  DATA.unshift(newDoc);
  fTemoigner();
  render();
  t2(L().tte);
}

function telecharger(){
  if(!actif){t2('Sélectionnez un témoignage');return;}
  var txt = '✦ TÉMOIGNAGE\n\n' + actif.nom + '\n' +
    (actif.ref ? '📖 ' + actif.ref + '\n' : '') +
    '\n' + actif.texte + '\n\n— Écho de Gloire · ProviLight';
  var blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'temoignage-provilight.txt';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  t2(L().ttl);
}

function fComment(){
  var mc = document.getElementById('modal-comment');
  if(mc) mc.style.display = 'none';
}
function envoyerComment(){
  var tx = document.getElementById('mc-texte');
  var txt = tx ? tx.value.trim() : '';
  var nomEl = document.getElementById('mc-nom');
  var nomC = nomEl ? nomEl.value.trim() : '';
  if(!txt){t2(L().toast_ecrire_comment||'Écris un commentaire');return;}
  // Sauvegarder sur Firebase
  if(window.fbPublierCommentaire && actif && actif.id){
    window.fbPublierCommentaire(actif.id, nomC||'Anonyme', txt).then(function(ok){
      if(ok){
        t2(L().tco||'💬 Commentaire envoyé !');
        if(tx) tx.value = '';
        if(nomEl) nomEl.value = '';
        fComment();
        // Recharger les commentaires dans le modal de lecture
        var commDiv = document.getElementById('mur-commentaires');
        if(commDiv && window.fbChargerCommentaires && actif.id){
          window.fbChargerCommentaires(actif.id, function(comms){
            if(!commDiv) return;
            if(comms.length === 0){
              commDiv.innerHTML = '<p style="text-align:center;font-style:italic;color:rgba(180,160,100,.9);font-size:.78rem;padding:8px;">'+(L().com_vide||'Aucun commentaire')+'</p>';
            } else {
              commDiv.innerHTML = comms.map(function(c){
                return '<div style="padding:8px 4px;border-bottom:1px solid rgba(255,255,255,.1);">'+
                  '<div style="font-family:Cinzel,serif;font-size:.55rem;color:rgba(212,168,67,.85);margin-bottom:3px;">'+
                    (c.nom||'Anonyme')+' <span style="opacity:.6;font-size:.5rem;">'+dA(c.ts)+'</span>'+
                  '</div>'+
                  '<div style="font-size:.85rem;line-height:1.55;color:rgba(30,12,2,.95);">'+c.texte+'</div>'+
                '</div>';
              }).join('');
            }
          });
        }
      }
    });
  } else {
    // Pas de Firebase — afficher quand même le message
    t2(L().tco||'💬 Commentaire envoyé !');
    if(tx) tx.value = '';
    if(nomEl) nomEl.value = '';
    fComment();
  }
}

// ── ACCUEIL AUDIO ─────────────────────────────────────
var _accFait=false;
function lireAccueilMur(){
  if(_accFait||!window.speechSynthesis)return;
  _accFait=true;
  var msgs={
    fr:"Bienvenue au Mur des Témoignages de l'Écho de Gloire ! Ici, chaque témoignage est une provision de bénédictions, d'inspiration et d'édification pour ta foi, à la gloire de Dieu !",
    en:"Welcome to the Wall of Testimonies of the Echo of Glory! Here, every testimony is a provision of blessings, inspiration and edification for your faith, to the glory of God!",
    ht:"Bienvenue au Mur des Témoignages de l'Écho de Gloire ! Ici, chaque témoignage est une provision de bénédictions, d'inspiration et d'édification pour ta foi, à la gloire de Dieu !",
    es:"¡Bienvenido al Muro de Testimonios del Eco de Gloria! Aquí, cada testimonio es una provisión de bendiciones, inspiración y edificación para tu fe, ¡a la gloria de Dios!"
  };
  var langVocal = langMur === 'ht' ? 'fr-FR' : ({fr:'fr-FR',en:'en-US',es:'es-ES'}[langMur]||'fr-FR');
  var u = new SpeechSynthesisUtterance(msgs[langMur]||msgs.fr);
  u.lang = langVocal;
  u.rate = 0.78; u.pitch = 1.05; u.volume = 1;
  var tryVoice = function(){
    var voix = window.speechSynthesis.getVoices();
    if(voix.length === 0){setTimeout(tryVoice, 200); return;}
    var match = voix.filter(function(v){return v.lang.startsWith(langVocal.substring(0,2));});
    match.sort(function(a,b){
      var sc=function(v){var n=v.name.toLowerCase();
        if(n.includes('premium')||n.includes('enhanced')||n.includes('neural'))return 3;
        if(n.includes('wavenet')||n.includes('natural'))return 2;
        return 0;};
      return sc(b)-sc(a);
    });
    if(match.length>0) u.voice = match[0];
    window.speechSynthesis.speak(u);
  };
  tryVoice();
}
document.body.addEventListener('click',function _ac(){setTimeout(lireAccueilMur,800);document.body.removeEventListener('click',_ac);},{once:true});

// ── DÉFILEMENT AUTO ───────────────────────────────
var scrollAuto = true;
var scrollPos = 0;
var scrollDir = 1;
var scrollTimer = null;
var btnScroll = document.getElementById('btn-scroll');
var murScroll = document.getElementById('mur-scroll');

function demarrerScrollAuto(){
  if(scrollTimer) clearInterval(scrollTimer);
  scrollTimer = setInterval(function(){
    if(!scrollAuto) return;
    scrollPos += scrollDir * 0.6;
    var max = murScroll.scrollHeight - murScroll.clientHeight;
    if(max <= 0) return;
    if(scrollPos >= max){ scrollDir = -1; }
    if(scrollPos <= 0){ scrollDir = 1; }
    murScroll.scrollTop = scrollPos;
  }, 30);
}

function toggleScroll(){
  scrollAuto = !scrollAuto;
  if(scrollAuto){
    btnScroll.textContent = L().aut||'⏵ AUTO';
    btnScroll.style.background = 'rgba(212,168,67,.14)';
    btnScroll.style.borderColor = 'rgba(212,168,67,.35)';
    scrollPos = murScroll.scrollTop;
    scrollDir = 1;
  } else {
    btnScroll.textContent = L().man||'✋ MANUEL';
    btnScroll.style.background = 'rgba(255,255,255,.08)';
    btnScroll.style.borderColor = 'rgba(255,255,255,.2)';
  }
}

// Pause auto-scroll si l'utilisateur fait défiler manuellement
murScroll.addEventListener('touchstart', function(){
  if(scrollAuto){ toggleScroll(); }
}, {passive:true});

// Démarrer après 3 secondes
setTimeout(function(){ demarrerScrollAuto(); }, 3000);
</script>
